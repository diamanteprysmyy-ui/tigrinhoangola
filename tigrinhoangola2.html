        user-select: none;

      }

      /* Respiração da Imagem do Tigre - Corrigido para -4px */
      @keyframes floatCircle {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      .animate-float-circle {
        animation: floatCircle 3.5s ease-in-out infinite;
      }

      /* Letreiro Rodapé */
      @keyframes marquee {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-100%);
        }
      }
      .animate-marquee {
        animation: marquee 30s linear infinite;
        display: inline-block;
      }

      /* ANIMAÇÃO SUPER GANHO */
      @keyframes dropInBounce {
        0% {
          transform: translateY(-100%) scale(0.8);
          opacity: 0;
        }
        60% {
          transform: translateY(10%) scale(1.05);
          opacity: 1;
        }
        80% {
          transform: translateY(-5%) scale(0.98);
          opacity: 1;
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      .animate-drop-in {
        animation: dropInBounce 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      /* ANIMAÇÃO DERROTA */
      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: scale(0.9);
        }
        20% {
          opacity: 1;
          transform: scale(1);
        }
        80% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.9);
        }
      }
      .animate-fade-in-out {

        );

      @keyframes spinGlow {

        }

          transform: rotate(360deg);
        }
      }

    <script>
      // ==========================================
      // SONS DO JOGO
      // ==========================================
      let somAtivo = true;

      // Criar contextos de áudio
      const somGanho = new Audio();
      somGanho.src = "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3";
      
      const somPerda = new Audio();
      somPerda.src = "https://www.soundjay.com/misc/sounds/failure-drum.mp3";
      
      const somGiro = new Audio();
      somGiro.src = "https://www.soundjay.com/misc/sounds/spinning-wheel-1.mp3";
      
      const somClique = new Audio();
      somClique.src = "https://www.soundjay.com/misc/sounds/button-click.mp3";

      // Configurar volumes
      somGanho.volume = 0.7;
      somPerda.volume = 0.6;
      somGiro.volume = 0.4;
      somClique.volume = 0.5;

      function tocarSom(som) {
        if (!somAtivo) return;
        try {
          som.currentTime = 0;
          som.play().catch(e => console.log("Erro ao tocar som:", e));
        } catch(e) {
          console.log("Erro ao tocar som:", e);
        }
      }

      function toggleSound() {
        somAtivo = !somAtivo;
        const btnSound = document.getElementById("btn-sound");
        if (somAtivo) {
          btnSound.innerHTML = "🔊";
          btnSound.style.color = "rgb(220, 166, 30)";
        } else {
          btnSound.innerHTML = "🔇";
          btnSound.style.color = "rgb(150, 150, 150)";
        }
      }

      // ==========================================
      // CONFIGURAÇÃO DO SISTEMA (AUTONOMIA TOTAL)
      // ==========================================
      const CONFIG_SISTEMA = {
        ganhosPorRodada: [
          8500, 0, 15000, 25000, 0, 12000, 18000, 22000, 0, 20500,
        ],
        totalRodadas: 10,
        simbolosJogo: ["🎆", "🏮", "🧧", "💰", "🐅"],
        tempoRodar: 1000, // Acelerei de 1200 para 1000ms para a máquina responder mais rápido
      };
      // ==========================================

      let rodadaAtual = 0;
      let saldo = 0;
      let isSpinning = false;

      function formatarKz(valor) {
        return valor.toLocaleString("pt-AO") + " Kz";
      }

      document.addEventListener("DOMContentLoaded", () => {
        const telefoneGuardado = localStorage.getItem("jogador_telefone");
        if (telefoneGuardado) {
          document.getElementById("display-jogador").innerText =
            `Olá, ${telefoneGuardado} 👋`;
        }
        atualizarDisplays();
      });

      function atualizarDisplays() {
        document.getElementById("display-rodadas").innerText =
          `${rodadaAtual}/${CONFIG_SISTEMA.totalRodadas}`;
        document.getElementById("display-saldo-top").innerText =
          formatarKz(saldo);
        document.getElementById("display-saldo-bot").innerText =
          formatarKz(saldo);
      }

      function girarMaquina() {
        if (isSpinning || rodadaAtual >= CONFIG_SISTEMA.totalRodadas) return;

        tocarSom(somClique);
        tocarSom(somGiro);

        isSpinning = true;
        rodadaAtual++;
        document.getElementById("display-ganho").innerText = "0 Kz";
        document.getElementById("btn-jogar").disabled = true;

        atualizarDisplays();

        const slots = [];
        for (let i = 0; i < 9; i++) {
          slots.push(document.getElementById(`slot-${i}`));
        }

        let tempoDecorrido = 0;

        const spinInterval = setInterval(() => {
          for (let i = 0; i < 9; i++) {
            slots[i].innerText =
              CONFIG_SISTEMA.simbolosJogo[
                Math.floor(Math.random() * CONFIG_SISTEMA.simbolosJogo.length)
              ];
          }
          tempoDecorrido += 80;

          if (tempoDecorrido >= CONFIG_SISTEMA.tempoRodar) {
            clearInterval(spinInterval);
            finalizarGiro(slots);
          }
        }, 80);
      }

      function finalizarGiro(slots) {
        const ganhoEstaRodada = CONFIG_SISTEMA.ganhosPorRodada[rodadaAtual - 1];

        const overlay = document.getElementById("overlay-notificacoes");
        const boxWin = document.getElementById("animacao-win");
        const boxLoss = document.getElementById("animacao-loss");

        if (ganhoEstaRodada > 0) {
          // VITÓRIA
          tocarSom(somGanho);
          
          const simboloVit =
            CONFIG_SISTEMA.simbolosJogo[
              Math.floor(Math.random() * CONFIG_SISTEMA.simbolosJogo.length)
            ];
          slots[3].innerText = simboloVit;
          slots[4].innerText = simboloVit;
          slots[5].innerText = simboloVit;

          const boxGanhoUI = document.getElementById("box-ganho");
          boxGanhoUI.style.backgroundColor = "rgba(33, 196, 93, 0.5)";
          setTimeout(() => {
            boxGanhoUI.style.backgroundColor = "rgba(0, 0, 0, 0.85)";
          }, 600);

          document.getElementById("valor-win").innerText =
            formatarKz(ganhoEstaRodada);

          overlay.classList.remove("hidden");
          overlay.classList.add("flex");

          boxWin.classList.remove("hidden");
          boxWin.classList.add("flex", "animate-drop-in");
          boxLoss.classList.add("hidden");

          setTimeout(() => {
            boxWin.classList.remove("animate-drop-in");
            boxWin.classList.add("hidden");
            boxWin.classList.remove("flex");
            overlay.classList.add("hidden");
            overlay.classList.remove("flex");

            saldo += ganhoEstaRodada;
            document.getElementById("display-ganho").innerText =
              formatarKz(ganhoEstaRodada);
            atualizarDisplays();

            isSpinning = false;
            verificarFimDeJogo();
          }, 2200);
        } else {
          // DERROTA
          tocarSom(somPerda);
          
          slots[3].innerText = CONFIG_SISTEMA.simbolosJogo[0];
          slots[4].innerText = CONFIG_SISTEMA.simbolosJogo[1];
          slots[5].innerText = CONFIG_SISTEMA.simbolosJogo[2];

          overlay.classList.remove("hidden");
          overlay.classList.add("flex");

          boxLoss.classList.remove("hidden");
          boxLoss.classList.add("flex", "animate-fade-in-out");
          boxWin.classList.add("hidden");

          setTimeout(() => {
            boxLoss.classList.remove("animate-fade-in-out");
            boxLoss.classList.add("hidden");
            boxLoss.classList.remove("flex");
            overlay.classList.add("hidden");
            overlay.classList.remove("flex");

            atualizarDisplays();
            isSpinning = false;
            verificarFimDeJogo();
          }, 1200);
        }
      }

      function verificarFimDeJogo() {
        if (rodadaAtual >= CONFIG_SISTEMA.totalRodadas) {
          finalizarFunil();
        } else {
          document.getElementById("btn-jogar").disabled = false;
        }
      }

      function finalizarFunil() {
        const btnJogar = document.getElementById("btn-jogar");
        btnJogar.disabled = true;
        btnJogar.style.background = "rgba(100, 100, 100, 0.5)";
        btnJogar.style.boxShadow = "none";

        document
          .getElementById("container-levantar")
          .classList.remove("hidden");
        document.getElementById("container-levantar").classList.add("block");
      }
    </script>
  

</body></html>
